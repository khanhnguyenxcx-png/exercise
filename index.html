<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Workout Muter & Countdown</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }
        .card {
            background: #1e1e1e;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            max-width: 600px;
            width: 100%;
            margin-bottom: 24px;
        }
        .input-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #a4b0be;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            background: #2f3542;
            border: 1px solid #57606f;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #ff6b81;
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            width: 100%;
            max-width: 800px;
            border-radius: 12px;
            overflow: hidden;
            display: none;
            box-shadow: 0 12px 36px rgba(0,0,0,0.5);
        }
        .video-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="color: #ff4757; margin-top: 0;">Mute & Motivate</h2>
        
        <div class="input-group">
            <label for="videoUrl">YouTube Video Link</label>
            <input type="text" id="videoUrl" placeholder="https://www.youtube.com/watch?v=...">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px;">
            <div class="input-group">
                <label for="startTime">When exercise starts (MM:SS)</label>
                <input type="text" id="startTime" value="00:00" placeholder="00:30">
            </div>
            <div class="input-group">
                <label for="duration">Exercise Timer Length (Seconds)</label>
                <input type="number" id="duration" value="45">
            </div>
        </div>

        <button onclick="startWorkout()">Launch Workout</button>
    </div>

    <div class="video-container" id="videoWrapper">
        <div id="player"></div>
    </div>

    <!-- YouTube Iframe API Loader -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let player;
        let trackingInterval;
        
        // Trackers so the voice doesn't repeat within the same second
        let triggered10 = false;
        let triggered3 = false;
        let triggered2 = false;
        let triggered1 = false;

        function convertToSeconds(timeStr) {
            const parts = timeStr.split(':');
            if (parts.length === 2) {
                return (parseInt(parts[0], 10) * 60) + parseInt(parts[1], 10);
            }
            return parseInt(timeStr, 10) || 0;
        }

        function extractVideoId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function speak(text) {
            window.speechSynthesis.cancel(); // Clear old queues
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.1; // Giving it some workout energy
            window.speechSynthesis.speak(utterance);
        }

        function startWorkout() {
            const url = document.getElementById('videoUrl').value;
            const id = extractVideoId(url);

            if (!id) {
                alert("Please enter a valid YouTube link!");
                return;
            }

            document.getElementById('videoWrapper').style.display = 'block';
            const startSec = convertToSeconds(document.getElementById('startTime').value);

            if (player) {
                player.loadVideoById({ videoId: id, startSeconds: startSec });
                resetFlags();
                return;
            }

            player = new YT.Player('player', {
                videoId: id,
                playerVars: { 'start': startSec, 'controls': 1, 'playsinline': 1 },
                events: {
                    'onReady': (e) => { e.target.mute(); e.target.playVideo(); },
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                clearInterval(trackingInterval);
                trackingInterval = setInterval(checkTime, 200); // Check time 5 times a second
            } else {
                clearInterval(trackingInterval);
            }
        }

        function checkTime() {
            const currentTime = player.getCurrentTime();
            const startSec = convertToSeconds(document.getElementById('startTime').value);
            const totalDuration = parseInt(document.getElementById('duration').value, 10);

            // Calculate exact seconds remaining on your exercise clock
            const elapsedWorkoutTime = currentTime - startSec;
            const secondsLeft = Math.ceil(totalDuration - elapsedWorkoutTime);

            // Reset tags if you jump backward or restart
            if (elapsedWorkoutTime < 1) resetFlags();

            if (secondsLeft === 10 && !triggered10) {
                speak("Don't give up yet!");
                triggered10 = true;
            }
            if (secondsLeft === 3 && !triggered3) {
                speak("3");
                triggered3 = true;
            }
            if (secondsLeft === 2 && !triggered2) {
                speak("2");
                triggered2 = true;
            }
            if (secondsLeft === 1 && !triggered1) {
                speak("1");
                triggered1 = true;
            }
        }

        function resetFlags() {
            triggered10 = false;
            triggered3 = false;
            triggered2 = false;
            triggered1 = false;
        }
    </script>
</body>
</html>
