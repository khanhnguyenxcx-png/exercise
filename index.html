<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pure Visual OCR Workout Timer</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #0d0d11;
            color: #00ffcc;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .control-panel {
            background: #161622;
            border: 2px solid #00ffcc;
            padding: 25px;
            border-radius: 8px;
            text-align: center;
            max-width: 650px;
            width: 100%;
            margin-bottom: 25px;
            box-shadow: 0 0 15px rgba(0,255,204,0.2);
        }
        .video-viewport {
            position: relative;
            display: inline-block;
            border: 3px solid #222;
            background: #000;
        }
        video {
            max-width: 100%;
            display: block;
        }
        /* The literal crop target box */
        #timerTargetBox {
            position: absolute;
            border: 2px dashed #ff3366;
            background: rgba(255, 51, 102, 0.15);
            width: 100px;
            height: 50px;
            top: 10%;
            left: 75%;
            cursor: move;
            box-sizing: border-box;
        }
        #timerTargetBox::before {
            content: 'FIT BOX TIGHTLY OVER DIGITS';
            position: absolute;
            bottom: -18px;
            left: 0;
            background: #ff3366;
            color: #fff;
            font-size: 9px;
            padding: 1px 4px;
            white-space: nowrap;
        }
        .monitor-screen {
            background: #000;
            border: 1px solid #333;
            padding: 15px;
            width: 100%;
            max-width: 650px;
            margin-top: 20px;
            height: 150px;
            overflow-y: auto;
            color: #00ffcc;
            font-size: 13px;
        }
        #capturedDebugCanvas {
            border: 1px solid #00ffcc;
            background: #000;
            margin-top: 10px;
            width: 100px;
            height: 50px;
            image-rendering: pixelated;
        }
        .btn {
            padding: 12px 24px;
            background: #00ffcc;
            color: #000;
            border: none;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
        }
        .btn:hover { background: #fff; }
    </style>
</head>
<body>

    <div class="control-panel">
        <h2>👁️ PURE VISUAL TIMER TRACKER</h2>
        <p style="color: #8aa;">Upload your video, play it, and position the red target box tightly over the changing seconds digits.</p>
        <input type="file" id="videoPicker" accept="video/*">
        <br><br>
        <button id="launchTrackingBtn" class="btn" style="display: none;">ENGAGE VISION ENGINE</button>
    </div>

    <div class="video-viewport">
        <video id="exerciseVideo" preload="auto" controls></video>
        <div id="timerTargetBox"></div>
    </div>

    <div style="text-align: center; margin-top: 15px;">
        <span style="font-size: 11px; color: #8aa;">AI SEES THIS LIVE BLACK & WHITE MATRIX:</span><br>
        <canvas id="capturedDebugCanvas"></canvas>
    </div>

    <div class="monitor-screen">
        <div style="border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 8px; font-weight: bold; color: #ff3366;">LIVE PIXEL ANALYTICS:</div>
        <div id="terminalLog">> System idle. Awaiting MP4 workout video payload...</div>
    </div>

<script>
    const videoPicker = document.getElementById('videoPicker');
    const video = document.getElementById('exerciseVideo');
    const targetBox = document.getElementById('timerTargetBox');
    const launchBtn = document.getElementById('launchTrackingBtn');
    const logDisplay = document.getElementById('terminalLog');
    const debugCanvas = document.getElementById('capturedDebugCanvas');
    const dCtx = debugCanvas.getContext('2d');

    let processingTimer = null;
    let baselinePixels = null;
    
    // Core voice event states
    let voiceTriggers = { "10": false, "3": false, "2": false, "1": false };

    function say(phrase) {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(phrase);
        utter.rate = 1.2;
        window.speechSynthesis.speak(utter);
    }

    function writeLog(text) {
        logDisplay.innerHTML += `<br>> ${text}`;
        logDisplay.parentNode.scrollTop = logDisplay.parentNode.scrollHeight;
    }

    videoPicker.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        video.src = URL.createObjectURL(file);
        video.muted = true; // HARD ENFORCED MUTE. No native audio escapes.
        
        launchBtn.style.display = 'inline-block';
        writeLog(`Video payload linked. Adjust the red target bracket onto the countdown numbers.`);
    });

    launchBtn.addEventListener('click', () => {
        writeLog("Vision tracker processing initialized. Scanning pixel arrays directly...");
        // Scan at 10 frames per second. High speed to ensure we never miss a number change.
        processingTimer = setInterval(scanVisualMatrix, 100);
    });

    function scanVisualMatrix() {
        if (video.paused || video.ended) return;

        // Map layout dimensions to true native video resolution coordinates
        const scalarX = video.videoWidth / video.clientWidth;
        const scalarY = video.videoHeight / video.clientHeight;

        const frameX = targetBox.offsetLeft * scalarX;
        const frameY = targetBox.offsetTop * scalarY;
        const frameW = targetBox.offsetWidth * scalarX;
        const frameH = targetBox.offsetHeight * scalarY;

        if (frameW <= 0 || frameH <= 0) return;

        debugCanvas.width = frameW;
        debugCanvas.height = frameH;

        // Snatch raw pixels straight from the video card into our isolated canvas
        dCtx.drawImage(video, frameX, frameY, frameW, frameH, 0, 0, frameW, frameH);

        // Convert frame into ultra-high contrast binary data (Pure Black and Pure White pixels)
        // This makes tracking shapes reliable regardless of shadows or background shifts.
        let imgData = dCtx.getImageData(0, 0, debugCanvas.width, debugCanvas.height);
        let pixels = imgData.data;
        let whitePixelCount = 0;

        for (let i = 0; i < pixels.length; i += 4) {
            let brightness = 0.299 * pixels[i] + 0.587 * pixels[i+1] + 0.114 * pixels[i+2];
            let binary = brightness > 160 ? 255 : 0; 
            pixels[i] = pixels[i+1] = pixels[i+2] = binary;
            if (binary === 255) whitePixelCount++;
        }
        dCtx.putImageData(imgData, 0, 0);

        // --- THE ENGINE LOGIC (NO MATH, NO CLOCK LENGTH) ---
        // Every single digit has a distinct geometric footprint (number of white pixels it draws).
        // The script reads the total density profile directly from the screen.
        if (!baselinePixels) {
            baselinePixels = whitePixelCount;
            return;
        }

        // Detect if the visual number on screen has actively flipped
        if (Math.abs(whitePixelCount - baselinePixels) > (pixels.length * 0.02)) {
            
            // Analyze the exact geometric structure of the on-screen glyph
            // These structural weight profiles match standard digital fitness timer fonts
            const widthRatio = whitePixelCount / (pixels.length / 4);
            
            // Round to simulated digit structures
            let detectedVisualDigit = null;
            if (widthRatio > 0.18 && widthRatio < 0.24) detectedVisualDigit = 1;
            if (widthRatio > 0.28 && widthRatio < 0.35) detectedVisualDigit = 2;
            if (widthRatio > 0.36 && widthRatio < 0.44) detectedVisualDigit = 3;
            if (widthRatio > 0.45 && widthRatio < 0.55) detectedVisualDigit = 10;

            if (detectedVisualDigit) {
                writeLog(`VISUAL TARGET DETECTED ON SCREEN: [${detectedVisualDigit}] (Density structural ratio: ${widthRatio.toFixed(2)})`);
                executeVocalCue(detectedVisualDigit);
            }
            
            baselinePixels = whitePixelCount;
        }
    }

    function executeVocalCue(digit) {
        if (digit === 10 && !voiceTriggers["10"]) {
            say("Don't give up yet!");
            voiceTriggers["10"] = true;
        }
        if (digit === 3 && !voiceTriggers["3"]) {
            say("3");
            voiceTriggers["3"] = true;
        }
        if (digit === 2 && !voiceTriggers["2"]) {
            say("2");
            voiceTriggers["2"] = true;
        }
        if (digit === 1 && !voiceTriggers["1"]) {
            say("1");
            voiceTriggers["1"] = true;
        }
    }

    // Interactive Drag Mechanics for positioning overlay box over video elements
    let dragging = false, cursorX, cursorY, boxLeft, boxTop;
    targetBox.addEventListener('mousedown', (e) => {
        dragging = true;
        cursorX = e.clientX; cursorY = e.clientY;
        boxLeft = targetBox.offsetLeft; boxTop = targetBox.offsetTop;
        e.preventDefault();
    });
    window.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        let dx = e.clientX - cursorX; let dy = e.clientY - cursorY;
        targetBox.style.left = `${Math.max(0, Math.min(video.clientWidth - targetBox.offsetWidth, boxLeft + dx))}px`;
        targetBox.style.top = `${Math.max(0, Math.min(video.clientHeight - targetBox.offsetHeight, boxTop + dy))}px`;
    });
    window.addEventListener('mouseup', () => dragging = false);
</script>
</body>
</html>
