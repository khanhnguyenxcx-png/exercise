<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Workout AI Assistant</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 850px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #ff4757;
            margin-bottom: 5px;
        }

        p {
            color: #a4b0be;
            margin-bottom: 25px;
        }

        .setup-box {
            background-color: #1e1e1e;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 25px;
        }

        .input-row {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            margin-bottom: 15px;
        }

        @media (min-width: 600px) {
            .input-row {
                flex-direction: row;
                justify-content: center;
            }
        }

        input[type="text"] {
            background: #2f3542;
            border: 1px solid #57606f;
            color: white;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            font-size: 16px;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="number"] {
            background: #2f3542;
            border: 1px solid #57606f;
            color: white;
            padding: 10px;
            border-radius: 6px;
            width: 80px;
            font-size: 16px;
            text-align: center;
        }

        button {
            background-color: #ff4757;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #ff6b81;
        }

        /* Container designed to maintain YouTube's 16:9 aspect ratio */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 ratio */
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #000;
            display: none; /* Hidden until URL is loaded */
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Mute & Motivate (YouTube Edition)</h1>
    <p>Paste a YouTube fitness video link. It will stream fully muted with automatic AI vocal countdown tracks overlayed.</p>

    <div class="setup-box">
        <div class="input-row">
            <input type="text" id="ytUrl" placeholder="Paste YouTube link here..." autocomplete="off">
            
            <div class="input-group">
                <label for="timerDuration">Timer length (sec):</label>
                <input type="number" id="timerDuration" value="45" min="11">
            </div>
            
            <button onclick="loadYouTubeVideo()">Load Video</button>
        </div>
    </div>

    <!-- YouTube iframe targets this wrapper -->
    <div class="video-wrapper" id="videoWrapper">
        <div id="player"></div>
    </div>
</div>

<!-- Load the external YouTube Iframe Player API -->
<script src="https://www.youtube.com/iframe_api"></script>

<script>
    let player;
    let checkTimerInterval;
    
    // State flags so the vocal engine doesn't stutter/repeat within the same second
    let spoken10s = false;
    let spoken3s = false;
    let spoken2s = false;
    let spoken1s = false;

    const synth = window.speechSynthesis;

    function speak(text) {
        synth.cancel(); // Clear any queued speech sounds immediately
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 1.15; // Energized high-tempo speech pacing
        synth.speak(utterance);
    }

    // Extract the standard 11-character video ID from various YouTube URL formats
    function extractVideoId(url) {
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    function loadYouTubeVideo() {
        const urlInput = document.getElementById('ytUrl').value;
        const videoId = extractVideoId(urlInput);

        if (!videoId) {
            alert("Please enter a valid YouTube video URL!");
            return;
        }

        // Show the player block container element
        document.getElementById('videoWrapper').style.display = 'block';

        // If player already exists, just swap the video track
        if (player && typeof player.loadVideoById === 'function') {
            player.loadVideoById({ videoId: videoId });
            resetVoiceFlags();
            return;
        }

        // Build a brand new YouTube player instance
        player = new YT.Player('player', {
            videoId: videoId,
            playerVars: {
                'playsinline': 1,
                'controls': 1,
                'rel': 0
            },
            events: {
                'onReady': onPlayerReady,
                'onStateChange': onPlayerStateChange
            }
        });
    }

    function onPlayerReady(event) {
        // CRUCIAL: Instantly mutes the incoming audio feeds from YouTube
        event.target.mute();
        speak("Workout loaded. Let's go!");
    }

    function onPlayerStateChange(event) {
        // If the video is playing (Status code 1), check timestamps continuously
        if (event.data == YT.PlayerState.PLAYING) {
            clearInterval(checkTimerInterval);
            checkTimerInterval = setInterval(monitorPlaybackTime, 200); // Check every 200ms for tight accuracy
        } else {
            clearInterval(checkTimerInterval);
        }
    }

    function monitorPlaybackTime() {
        if (!player || typeof player.getCurrentTime !== 'function') return;

        const currentTime = player.getCurrentTime();
        const totalDurationSetting = parseFloat(document.getElementById('timerDuration').value);
        const secondsRemaining = Math.ceil(totalDurationSetting - currentTime);

        // Reset system flags if the user loops or clicks backward to start over
        if (currentTime < 1) {
            resetVoiceFlags();
        }

        // 1. Audio cue at 10-second mark
        if (secondsRemaining === 10 && !spoken10s) {
            speak("Don't give up yet!");
            spoken10s = true;
        }

        // 2. Final 3 - 2 - 1 countdown marks
        if (secondsRemaining === 3 && !spoken3s) {
            speak("3");
            spoken3s = true;
        }
        if (secondsRemaining === 2 && !spoken2s) {
            speak("2");
            spoken2s = true;
        }
        if (secondsRemaining === 1 && !spoken1s) {
            speak("1");
            spoken1s = true;
        }
    }

    function resetVoiceFlags() {
        spoken10s = false;
        spoken3s = false;
        spoken2s = false;
        spoken1s = false;
    }
</script>

</body>
</html>
